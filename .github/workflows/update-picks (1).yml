name: Update Picks Dashboard
on:
  schedule:
    - cron: '*/30 12-4 * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python update_picks.py
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
      - run: |
          git config user.name "picks-bot"
          git config user.email "picks-bot@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-update picks"
          git push
