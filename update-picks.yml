name: Update Picks Dashboard

on:
  schedule:
    - cron: '*/30 12-4 * * *'  # Every 30 min, noon–4am UTC (8am–midnight ET)
  workflow_dispatch:             # Also allows manual trigger from GitHub

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests anthropic

      - name: Run update script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python update_picks.py

      - name: Commit and push if changed
        run: |
          git config user.name "picks-bot"
          git config user.email "picks-bot@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-update picks dashboard"
          git push
